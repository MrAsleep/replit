<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evidencija vežbača - Teretana</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="app-box p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="gym-icon mb-2">🏋️</div>
          <h1 class="main-title">Evidencija vežbača</h1>
          <p class="text-muted mb-0">
            Dodavanje vežbača, BMI računanje, filtriranje i sortiranje
          </p>
        </div>

        <div
          class="d-flex flex-column flex-md-row gap-3 justify-content-center mb-4"
        >
          <button
            id="btnDodajVezbaca"
            class="btn btn-primary btn-lg px-4"
            type="button"
          >
            Dodaj vežbača
          </button>

          <button
            id="btnPrikaziVezbace"
            class="btn btn-outline-dark btn-lg px-4"
            type="button"
          >
            Prikaži vežbače
          </button>
        </div>

        <!-- FORMA -->
        <section id="formaSekcija">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
              <h3 class="mb-4">Unos vežbača</h3>

              <form id="vezbacForm" class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="ime" class="form-label">Ime i prezime</label>
                  <input
                    type="text"
                    id="ime"
                    class="form-control"
                    placeholder="Unesi ime i prezime"
                  />
                </div>

                <div class="col-12 col-md-3">
                  <label for="godine" class="form-label">Godine</label>
                  <input
                    type="number"
                    id="godine"
                    class="form-control"
                    placeholder="Npr. 25"
                  />
                </div>

                <div class="col-12 col-md-3">
                  <label class="form-label d-block">Pol</label>

                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="pol"
                      id="muski"
                      value="Muški"
                      checked
                    />
                    <label class="form-check-label" for="muski">Muški</label>
                  </div>

                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="pol"
                      id="zenski"
                      value="Ženski"
                    />
                    <label class="form-check-label" for="zenski">Ženski</label>
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <label for="visina" class="form-label">Visina (m)</label>
                  <input
                    type="number"
                    step="0.01"
                    id="visina"
                    class="form-control"
                    placeholder="Npr. 1.75"
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="tezina" class="form-label">Težina (kg)</label>
                  <input
                    type="number"
                    step="0.1"
                    id="tezina"
                    class="form-control"
                    placeholder="Npr. 80"
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="cilj" class="form-label">Cilj treninga</label>
                  <select id="cilj" class="form-select">
                    <option value="Mršavljenje">Mršavljenje</option>
                    <option value="Izgradnja mišića">Izgradnja mišića</option>
                    <option value="Održavanje forme">Održavanje forme</option>
                    <option value="Povećanje snage">Povećanje snage</option>
                    <option value="Kardio kondicija">Kardio kondicija</option>
                  </select>
                </div>

                <div class="col-12 col-md-6">
                  <label for="clanarina" class="form-label">Tip članarine</label>
                  <select id="clanarina" class="form-select">
                    <option value="Mesečna">Mesečna</option>
                    <option value="Tromesečna">Tromesečna</option>
                    <option value="Godišnja">Godišnja</option>
                    <option value="Jednokratna">Jednokratna (po treningu)</option>
                  </select>
                </div>

                <div class="col-12">
                  <label for="napomena" class="form-label">Napomena / Trening plan</label>
                  <textarea
                    id="napomena"
                    class="form-control"
                    rows="3"
                    placeholder="Npr. trening 3x nedeljno, poseban program..."
                  ></textarea>
                </div>

                <div class="col-12 d-flex flex-column flex-sm-row gap-2">
                  <button type="submit" class="btn btn-success px-4">
                    Sačuvaj vežbača
                  </button>
                  <button type="reset" class="btn btn-secondary px-4">
                    Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>

        <!-- VEZBACI -->
        <section id="vezbaciSekcija" class="d-none mt-4">
          <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                  <label for="filterKategorija" class="form-label"
                    >Filtriraj po BMI kategoriji</label
                  >
                  <select id="filterKategorija" class="form-select">
                    <option value="Sve">Sve</option>
                    <option value="Pothranjenost">Pothranjenost</option>
                    <option value="Normalna težina">Normalna težina</option>
                    <option value="Prekomerna težina">Prekomerna težina</option>
                    <option value="Gojaznost">Gojaznost</option>
                  </select>
                </div>

                <div class="col-12 col-md-4">
                  <label for="sortiranje" class="form-label"
                    >Sortiranje po BMI</label
                  >
                  <select id="sortiranje" class="form-select">
                    <option value="default">Bez sortiranja</option>
                    <option value="min-max">Od min ka max</option>
                    <option value="max-min">Od max ka min</option>
                  </select>
                </div>

                <div class="col-12 col-md-4">
                  <button
                    id="btnPrimeni"
                    class="btn btn-primary w-100"
                    type="button"
                  >
                    Primeni
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div
            class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3"
          >
            <h3 class="mb-0">Lista vežbača</h3>
            <span id="brojVezbaca" class="badge text-bg-primary fs-6"
              >0 vežbača</span
            >
          </div>

          <div id="vezbaciContainer" class="row g-4"></div>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
